services:
  onlyoffice-documentserver:
    image: onlyoffice/documentserver:latest
    container_name: standard-inclusions-onlyoffice
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: "${ONLYOFFICE_JWT_SECRET}"
      JWT_HEADER: Authorization
    volumes:
      - onlyoffice-documentserver-data:/var/www/onlyoffice/Data
      - onlyoffice-documentserver-logs:/var/log/onlyoffice
      - onlyoffice-documentserver-cache:/var/lib/onlyoffice
      - onlyoffice-documentserver-db:/var/lib/postgresql

volumes:
  onlyoffice-documentserver-data:
  onlyoffice-documentserver-logs:
  onlyoffice-documentserver-cache:
  onlyoffice-documentserver-db:
