<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0020"/>
      <stop offset="60%" stop-color="#110033"/>
      <stop offset="100%" stop-color="#030818"/>
    </linearGradient>
    <linearGradient id="purpleCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a0f3e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="goldBtn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="personGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd5b0"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <linearGradient id="buyerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="linkCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="coinFace" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fff8c2"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
    <radialGradient id="glowPurpleR" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGoldR" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreenR" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="675" fill="url(#dots)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="337" rx="260" ry="200" fill="url(#glowPurpleR)"/>
  <ellipse cx="600" cy="337" rx="200" ry="160" fill="url(#glowGoldR)"/>
  <ellipse cx="1000" cy="337" rx="220" ry="200" fill="url(#glowGreenR)"/>

  <!-- ===================== LEFT: CREATOR ===================== -->
  <!-- Creator glow halo -->
  <circle cx="195" cy="300" r="130" fill="#7c3aed" opacity="0.08"/>

  <!-- Creator card -->
  <g transform="translate(60, 185)" filter="url(#shadow)">
    <rect width="270" height="300" rx="24" fill="url(#purpleCard)" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.7"/>
    <!-- Top accent bar -->
    <rect width="270" height="5" rx="2.5" fill="url(#personGrad)"/>

    <!-- Avatar -->
    <circle cx="135" cy="90" r="50" fill="#4c1d95" stroke="#8b5cf6" stroke-width="2"/>
    <!-- Head -->
    <circle cx="135" cy="72" r="22" fill="url(#skinGrad)"/>
    <!-- Body -->
    <path d="M 85,138 Q 85,110 135,110 Q 185,110 185,138" fill="url(#personGrad)"/>

    <!-- Megaphone / broadcast icon below avatar -->
    <g transform="translate(95, 155)">
      <!-- Megaphone body -->
      <path d="M 10,18 L 10,28 L 20,28 L 20,18 L 60,0 L 60,46 L 20,28 Z" fill="#a78bfa" opacity="0.9"/>
      <!-- Sound waves -->
      <path d="M 66,8 Q 78,23 66,38" fill="none" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
      <path d="M 72,2 Q 90,23 72,44" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <!-- Handle -->
      <rect x="0" y="20" width="14" height="10" rx="3" fill="#7c3aed"/>
    </g>

    <!-- Link badge -->
    <g transform="translate(30, 248)">
      <rect width="210" height="36" rx="18" fill="#6d28d9" opacity="0.7" stroke="#a78bfa" stroke-width="1"/>
      <!-- chain link icon -->
      <g transform="translate(16, 10)" fill="none" stroke="#c4b5fd" stroke-width="2.2" stroke-linecap="round">
        <rect x="0" y="2" width="14" height="10" rx="5"/>
        <rect x="10" y="2" width="14" height="10" rx="5"/>
      </g>
      <!-- dots representing URL -->
      <rect x="44" y="16" width="50" height="5" rx="2.5" fill="#a78bfa" opacity="0.7"/>
      <rect x="100" y="16" width="30" height="5" rx="2.5" fill="#7c3aed" opacity="0.5"/>
      <!-- Copy icon -->
      <g transform="translate(178, 10)" fill="none" stroke="#a78bfa" stroke-width="1.8">
        <rect x="0" y="4" width="10" height="10" rx="2"/>
        <rect x="4" y="0" width="10" height="10" rx="2" fill="#6d28d9"/>
      </g>
    </g>
  </g>

  <!-- ===================== CENTER: LINK CARD ===================== -->
  <!-- Center glow -->
  <circle cx="600" cy="300" r="110" fill="#f59e0b" opacity="0.06" filter="url(#glow)"/>

  <!-- Phone device frame -->
  <g transform="translate(510, 130)" filter="url(#shadow)">
    <!-- Phone outer -->
    <rect width="180" height="320" rx="28" fill="#1e1b4b" stroke="#4338ca" stroke-width="2"/>
    <!-- Screen area -->
    <rect x="10" y="14" width="160" height="292" rx="20" fill="#0f0f2e"/>
    <!-- Notch -->
    <rect x="60" y="14" width="60" height="18" rx="9" fill="#1e1b4b"/>
    <!-- Camera dot -->
    <circle cx="90" cy="23" r="4" fill="#312e81"/>

    <!-- App content on screen -->
    <!-- Top bar -->
    <rect x="20" y="42" width="100" height="8" rx="4" fill="#4338ca" opacity="0.6"/>
    <rect x="128" y="42" width="32" height="8" rx="4" fill="#7c3aed" opacity="0.4"/>

    <!-- Product image placeholder -->
    <rect x="20" y="62" width="140" height="80" rx="10" fill="#1e2060"/>
    <!-- Product icon inside -->
    <g transform="translate(70, 82)" fill="#4f46e5" opacity="0.7">
      <rect x="0" y="15" width="40" height="30" rx="4"/>
      <path d="M 6,15 Q 6,0 20,0 Q 34,0 34,15" fill="none" stroke="#6366f1" stroke-width="3"/>
    </g>

    <!-- Product name bars -->
    <rect x="20" y="152" width="90" height="7" rx="3.5" fill="#6366f1" opacity="0.7"/>
    <rect x="20" y="165" width="60" height="6" rx="3" fill="#4338ca" opacity="0.4"/>

    <!-- Price -->
    <rect x="20" y="180" width="50" height="9" rx="4.5" fill="#f59e0b" opacity="0.8"/>

    <!-- Stars row -->
    <g transform="translate(20, 198)" fill="#f59e0b" opacity="0.8">
      <polygon points="8,0 10,5 15,5 11,8 13,13 8,10 3,13 5,8 1,5 6,5"/>
      <polygon points="8,0 10,5 15,5 11,8 13,13 8,10 3,13 5,8 1,5 6,5" transform="translate(18,0)"/>
      <polygon points="8,0 10,5 15,5 11,8 13,13 8,10 3,13 5,8 1,5 6,5" transform="translate(36,0)"/>
      <polygon points="8,0 10,5 15,5 11,8 13,13 8,10 3,13 5,8 1,5 6,5" transform="translate(54,0)"/>
      <polygon points="8,0 10,5 15,5 11,8 13,13 8,10 3,13 5,8 1,5 6,5" transform="translate(72,0)" opacity="0.3"/>
    </g>

    <!-- BUY button -->
    <rect x="20" y="222" width="140" height="34" rx="17" fill="url(#goldBtn)"/>
    <rect x="20" y="222" width="140" height="34" rx="17" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
    <!-- Cart icon in button -->
    <g transform="translate(60, 232)" fill="none" stroke="#1c0a00" stroke-width="2" stroke-linecap="round">
      <circle cx="8" cy="20" r="2.5" fill="#1c0a00"/>
      <circle cx="20" cy="20" r="2.5" fill="#1c0a00"/>
      <path d="M 0,4 L 4,4 L 8,16 L 20,16 L 24,6 L 4,6"/>
    </g>
    <!-- BUY text -->
    <text x="100" y="245" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1c0a00">BUY NOW</text>

    <!-- Ref badge -->
    <rect x="20" y="265" width="140" height="28" rx="8" fill="#312e81" opacity="0.8"/>
    <g transform="translate(28, 273)" fill="none" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round">
      <rect x="0" y="2" width="10" height="8" rx="3"/>
      <rect x="7" y="2" width="10" height="8" rx="3"/>
    </g>
    <rect x="48" y="272" width="55" height="5" rx="2.5" fill="#818cf8" opacity="0.6"/>
    <rect x="48" y="281" width="38" height="4" rx="2" fill="#6366f1" opacity="0.4"/>
    <!-- Tracking dot -->
    <circle cx="148" cy="279" r="7" fill="#7c3aed"/>
    <circle cx="148" cy="279" r="4" fill="#a78bfa"/>
  </g>

  <!-- ===================== RIGHT: BUYER ===================== -->
  <!-- Buyer glow halo -->
  <circle cx="1005" cy="300" r="130" fill="#10b981" opacity="0.07"/>

  <!-- Buyer card -->
  <g transform="translate(870, 185)" filter="url(#shadow)">
    <rect width="270" height="300" rx="24" fill="#052e16" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.7"/>
    <!-- Top accent bar -->
    <rect width="270" height="5" rx="2.5" fill="url(#greenGrad)"/>

    <!-- Avatar -->
    <circle cx="135" cy="90" r="50" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
    <!-- Head -->
    <circle cx="135" cy="72" r="22" fill="url(#skinGrad)"/>
    <!-- Body -->
    <path d="M 85,138 Q 85,110 135,110 Q 185,110 185,138" fill="url(#buyerGrad)"/>

    <!-- Shopping bag in hands -->
    <g transform="translate(95, 155)">
      <!-- Bag body -->
      <rect x="10" y="16" width="60" height="50" rx="6" fill="#065f46" stroke="#34d399" stroke-width="1.5"/>
      <!-- Handles -->
      <path d="M 22,16 Q 22,4 40,4 Q 58,4 58,16" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
      <!-- Brand stripe -->
      <rect x="10" y="38" width="60" height="8" fill="#10b981" opacity="0.5"/>
      <!-- Stars on bag -->
      <g fill="#fbbf24" transform="translate(15,52)">
        <polygon points="5,0 6,3 10,3 7,5 8,8 5,6 2,8 3,5 0,3 4,3" transform="scale(0.8)"/>
        <polygon points="5,0 6,3 10,3 7,5 8,8 5,6 2,8 3,5 0,3 4,3" transform="scale(0.8) translate(14,0)"/>
        <polygon points="5,0 6,3 10,3 7,5 8,8 5,6 2,8 3,5 0,3 4,3" transform="scale(0.8) translate(28,0)"/>
      </g>
    </g>

    <!-- Checkmark / confirmed badge -->
    <g transform="translate(30, 248)">
      <rect width="210" height="36" rx="18" fill="#065f46" stroke="#34d399" stroke-width="1" opacity="0.9"/>
      <circle cx="26" cy="18" r="12" fill="#10b981"/>
      <path d="M 20,18 L 24,22 L 33,13" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <rect x="50" y="13" width="70" height="6" rx="3" fill="#34d399" opacity="0.7"/>
      <rect x="50" y="23" width="50" height="5" rx="2.5" fill="#059669" opacity="0.5"/>
    </g>
  </g>

  <!-- ===================== ARROWS ===================== -->

  <!-- Creator → Phone: referral share arrow (purple dashed) -->
  <path d="M 335,295 C 400,270 460,250 510,250" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="10,6" marker-end="url(#arrowGold)" opacity="0.9" filter="url(#glowSoft)"/>

  <!-- Phone → Buyer: purchase arrow (blue) -->
  <path d="M 690,255 C 740,255 800,270 870,295" fill="none" stroke="#60a5fa" stroke-width="3" stroke-dasharray="10,6" marker-end="url(#arrowGreen)" opacity="0.9" filter="url(#glowSoft)"/>

  <!-- BIG return arrow: Buyer → Creator (gold, commission flowing back) -->
  <path d="M 960,490 C 900,570 700,595 600,595 C 500,595 300,570 240,490" fill="none" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrowGold)" opacity="1" filter="url(#glowGold)"/>
  <!-- Duplicate thinner for glow effect -->
  <path d="M 960,490 C 900,570 700,595 600,595 C 500,595 300,570 240,490" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.4"/>

  <!-- Commission badge on return arrow -->
  <g transform="translate(540, 555)" filter="url(#shadow)">
    <rect x="-70" y="-28" width="140" height="56" rx="28" fill="#92400e"/>
    <rect x="-70" y="-28" width="140" height="56" rx="28" fill="url(#goldGrad)" opacity="0.2"/>
    <rect x="-70" y="-28" width="140" height="56" rx="28" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <!-- Coin icon -->
    <ellipse cx="-32" cy="2" rx="18" ry="18" fill="url(#coinFace)"/>
    <text x="-32" y="8" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7c2d00">$</text>
    <!-- % text -->
    <text x="24" y="10" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="900" fill="#fef3c7">20%</text>
  </g>

  <!-- ===================== FLOATING COINS ===================== -->
  <!-- Coins flowing along return arrow -->
  <g filter="url(#glow)">
    <!-- Coin 1 -->
    <ellipse cx="380" cy="540" rx="22" ry="22" fill="url(#coinFace)"/>
    <ellipse cx="380" cy="540" rx="16" ry="16" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>
    <text x="380" y="546" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7c2d00">$</text>
    <!-- Coin 2 -->
    <ellipse cx="760" cy="575" rx="18" ry="18" fill="url(#coinFace)"/>
    <ellipse cx="760" cy="575" rx="13" ry="13" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>
    <text x="760" y="581" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#7c2d00">$</text>
    <!-- Coin 3 (small) -->
    <ellipse cx="470" cy="578" rx="13" ry="13" fill="url(#coinFace)" opacity="0.8"/>
    <text x="470" y="583" text-anchor="middle" font-family="serif" font-size="10" font-weight="bold" fill="#7c2d00">$</text>
    <!-- Coin 4 (small) -->
    <ellipse cx="880" cy="548" rx="13" ry="13" fill="url(#coinFace)" opacity="0.8"/>
    <text x="880" y="553" text-anchor="middle" font-family="serif" font-size="10" font-weight="bold" fill="#7c2d00">$</text>
  </g>

  <!-- ===================== STEP LABELS ===================== -->
  <!-- Step 1 badge -->
  <g transform="translate(155, 148)">
    <circle cx="18" cy="18" r="18" fill="#6d28d9" filter="url(#glowSoft)"/>
    <text x="18" y="23" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">1</text>
  </g>
  <!-- Step 2 badge -->
  <g transform="translate(562, 93)">
    <circle cx="18" cy="18" r="18" fill="#4338ca" filter="url(#glowSoft)"/>
    <text x="18" y="23" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">2</text>
  </g>
  <!-- Step 3 badge -->
  <g transform="translate(956, 148)">
    <circle cx="18" cy="18" r="18" fill="#065f46" stroke="#34d399" stroke-width="1.5" filter="url(#glowSoft)"/>
    <text x="18" y="23" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">3</text>
  </g>

  <!-- ===================== SPARKLES / PARTICLES ===================== -->
  <g opacity="0.7">
    <circle cx="430" cy="190" r="3" fill="#a78bfa" filter="url(#glowSoft)"/>
    <circle cx="770" cy="165" r="2.5" fill="#60a5fa" filter="url(#glowSoft)"/>
    <circle cx="100" cy="530" r="3" fill="#f59e0b" filter="url(#glowSoft)"/>
    <circle cx="1095" cy="500" r="3" fill="#34d399" filter="url(#glowSoft)"/>
    <circle cx="330" cy="145" r="2" fill="#c4b5fd"/>
    <circle cx="870" cy="155" r="2" fill="#6ee7b7"/>
    <circle cx="630" cy="78" r="2.5" fill="#fbbf24"/>
    <!-- 4-point stars -->
    <path d="M 455 420 L 458 428 L 466 428 L 460 433 L 462 441 L 455 436 L 448 441 L 450 433 L 444 428 L 452 428 Z" fill="#f59e0b" opacity="0.5" transform="scale(0.7) translate(200,190)"/>
    <path d="M 455 420 L 458 428 L 466 428 L 460 433 L 462 441 L 455 436 L 448 441 L 450 433 L 444 428 L 452 428 Z" fill="#a78bfa" opacity="0.5" transform="scale(0.6) translate(-100,100)"/>
  </g>

  <!-- Subtle bottom vignette -->
  <linearGradient id="vignette" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="85%" stop-color="#0c0020" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0c0020" stop-opacity="0.7"/>
  </linearGradient>
  <rect width="1200" height="675" fill="url(#vignette)"/>
</svg>

